<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Burrito — Trazado de Rutas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; height: 100vh; display: flex; flex-direction: column; }
    header {
      background: #16213e; padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid #0f3460; flex-shrink: 0;
    }
    header h1 { font-size: 18px; color: #e94560; }
    #contenedor { display: flex; flex: 1; overflow: hidden; }
    #mapa { flex: 1; }
    #panel {
      width: 300px; background: #16213e; padding: 16px;
      overflow-y: auto; border-left: 2px solid #0f3460;
      display: flex; flex-direction: column; gap: 12px;
    }
    .seccion { background: #0f3460; border-radius: 8px; padding: 12px; }
    .seccion h2 { font-size: 13px; color: #e94560; margin-bottom: 10px; }
    .ruta-btn {
      width: 100%; padding: 10px; margin-bottom: 8px;
      border: 2px solid #2e4a7a; border-radius: 6px;
      background: #16213e; color: white; cursor: pointer;
      font-size: 13px; text-align: left; transition: all 0.2s;
    }
    .ruta-btn:hover { border-color: #e94560; }
    .ruta-btn.seleccionada { border-color: #e94560; background: #2a1a2e; }
    .ruta-btn .ruta-estado {
      font-size: 10px; margin-top: 4px;
      display: block;
    }
    .ruta-btn .trazada { color: #27ae60; }
    .ruta-btn .sin-trazar { color: #888; }
    .instruccion {
      font-size: 12px; color: #aaa; line-height: 1.6;
      background: #0f3460; border-radius: 6px; padding: 10px;
    }
    .instruccion b { color: #e94560; }
    #info-puntos {
      font-size: 12px; color: #ccc;
      background: #0f3460; border-radius: 6px; padding: 10px;
    }
    #info-resultado {
      font-size: 12px; background: #0f3460;
      border-radius: 6px; padding: 10px; display: none;
    }
    #info-resultado p { margin: 3px 0; }
    .btn-accion {
      width: 100%; padding: 12px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: bold;
      margin-bottom: 8px;
    }
    .btn-guardar { background: #27ae60; color: white; }
    .btn-guardar:disabled { background: #444; cursor: not-allowed; }
    .btn-limpiar { background: #0f3460; color: #aaa; font-size: 13px; padding: 8px; }
    .btn-volver {
      background: #0f3460; color: white; border: none;
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #cargando {
      display: none; text-align: center; padding: 12px;
      color: #f39c12; font-size: 13px;
    }
    #msg { font-size: 12px; padding: 8px; border-radius: 6px; display: none; }
    #msg.ok { background: #1a3a1a; color: #27ae60; display: block; }
    #msg.err { background: #3a1a1a; color: #e94560; display: block; }
  </style>
</head>
<body>

<header>
  <h1>✏️ Trazado de Rutas — El Burrito</h1>
  <button class="btn-volver" onclick="window.location.href='/admin'">← Volver al Admin</button>
</header>

<div id="contenedor">
  <div id="mapa"></div>
  <div id="panel">

    <div class="seccion">
      <h2>📍 Selecciona una ruta</h2>
      <button class="ruta-btn" id="btn-cono_norte" onclick="seleccionarRuta('cono_norte','Ruta Norte')">
        🧭 Ruta Norte
        <span class="ruta-estado sin-trazar" id="estado-cono_norte">Sin trazar</span>
      </button>
      <button class="ruta-btn" id="btn-cono_sur" onclick="seleccionarRuta('cono_sur','Ruta Sur')">
        🧭 Ruta Sur
        <span class="ruta-estado sin-trazar" id="estado-cono_sur">Sin trazar</span>
      </button>
      <button class="ruta-btn" id="btn-cono_este" onclick="seleccionarRuta('cono_este','Ruta Este')">
        🧭 Ruta Este
        <span class="ruta-estado sin-trazar" id="estado-cono_este">Sin trazar</span>
      </button>
      <button class="ruta-btn" id="btn-cono_centro" onclick="seleccionarRuta('cono_centro','Ruta Centro')">
        🧭 Ruta Centro
        <span class="ruta-estado sin-trazar" id="estado-cono_centro">Sin trazar</span>
      </button>
      <button class="ruta-btn" id="btn-interna" onclick="seleccionarRuta('interna','Ruta Interna')">
        🏫 Ruta Interna
        <span class="ruta-estado sin-trazar" id="estado-interna">Sin trazar</span>
      </button>
    </div>

    <div class="instruccion">
      <b>Cómo trazar:</b><br>
      • <b>Clic izquierdo</b> → agregar punto<br>
      • <b>Clic derecho</b> → quitar último punto<br>
      • Marca cada paradero y cada curva importante<br>
      • ORS ajustará la ruta a calles reales de Lima
    </div>

    <div id="info-puntos">
      Selecciona una ruta para empezar.
    </div>

    <div id="info-resultado">
      <p id="res-distancia"></p>
      <p id="res-duracion"></p>
    </div>

    <div id="cargando">⏳ Calculando ruta con ORS...</div>
    <div id="msg"></div>

    <button class="btn-accion btn-guardar" id="btn-guardar"
      onclick="guardarRuta()" disabled>
      💾 Guardar ruta
    </button>
    <button class="btn-accion btn-limpiar" onclick="limpiarPuntos()">
      🗑️ Limpiar puntos
    </button>

  </div>
</div>

<script>
  const mapa = L.map('mapa').setView([-12.0566, -77.0833], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(mapa);

  let rutaActual = null;
  let nombreActual = null;
  let puntos = [];
  let marcadores = [];
  let lineaPreview = null;
  let lineaORS = null;

  const COLORES = {
    cono_norte: '#e94560',
    cono_sur: '#27ae60',
    cono_este: '#f39c12',
    cono_centro: '#2e75b6',
    interna: '#8e44ad',
  };

  // ── Cargar estados de rutas existentes ────────────────────────────────────
  async function cargarEstados() {
    try {
      const res = await fetch('/rutas-admin/');
      const data = await res.json();
      data.rutas.forEach(r => {
        const el = document.getElementById(`estado-${r.ruta_clave}`);
        if (el) {
          el.textContent = `✓ ${r.duracion_minutos} min · ${r.distancia_km} km`;
          el.className = 'ruta-estado trazada';
        }
      });
    } catch(e) { console.error('Error cargando estados:', e); }
  }

  // ── Seleccionar ruta ──────────────────────────────────────────────────────
  async function seleccionarRuta(clave, nombre) {
    // Limpiar selección anterior
    document.querySelectorAll('.ruta-btn').forEach(b =>
      b.classList.remove('seleccionada'));
    document.getElementById(`btn-${clave}`).classList.add('seleccionada');

    rutaActual = clave;
    nombreActual = nombre;
    limpiarPuntos();

    document.getElementById('info-puntos').textContent =
      `${nombre} seleccionada. Haz clic en el mapa para trazar.`;
    document.getElementById('msg').className = '';
    document.getElementById('msg').textContent = '';

    // Cargar ruta existente si ya fue trazada
    try {
      const res = await fetch('/rutas-admin/');
      const data = await res.json();
      const existente = data.rutas.find(r => r.ruta_clave === clave);
      if (existente && existente.puntos.length > 0) {
        // Mostrar la ruta existente como referencia
        if (lineaORS) mapa.removeLayer(lineaORS);
        lineaORS = L.polyline(existente.puntos, {
          color: COLORES[clave],
          weight: 5,
          opacity: 0.7,
          dashArray: '8,4',
        }).addTo(mapa);
        mapa.fitBounds(lineaORS.getBounds(), { padding: [30, 30] });
        document.getElementById('info-resultado').style.display = 'block';
        document.getElementById('res-distancia').textContent =
          `📏 Distancia: ${existente.distancia_km} km`;
        document.getElementById('res-duracion').textContent =
          `⏱️ Duración estimada: ${existente.duracion_minutos} min`;
      }
    } catch(e) {}
  }

  // ── Clic en el mapa → agregar punto ──────────────────────────────────────
  mapa.on('click', (e) => {
    if (!rutaActual) {
      alert('Selecciona una ruta primero.');
      return;
    }
    const { lat, lng } = e.latlng;
    puntos.push({ lat, lng });

    const marcador = L.circleMarker([lat, lng], {
      radius: 6,
      fillColor: COLORES[rutaActual],
      color: 'white',
      weight: 2,
      fillOpacity: 1,
    }).addTo(mapa).bindTooltip(`Punto ${puntos.length}`, { permanent: false });
    marcadores.push(marcador);

    actualizarPreview();
    actualizarInfoPuntos();
  });

  // ── Clic derecho → quitar último punto ────────────────────────────────────
  mapa.on('contextmenu', (e) => {
    e.originalEvent.preventDefault();
    if (puntos.length === 0) return;
    puntos.pop();
    const ultimo = marcadores.pop();
    if (ultimo) mapa.removeLayer(ultimo);
    actualizarPreview();
    actualizarInfoPuntos();
  });

  // ── Preview de la línea mientras traza ───────────────────────────────────
  function actualizarPreview() {
    if (lineaPreview) mapa.removeLayer(lineaPreview);
    if (puntos.length >= 2) {
      lineaPreview = L.polyline(
        puntos.map(p => [p.lat, p.lng]),
        { color: COLORES[rutaActual], weight: 3, opacity: 0.5, dashArray: '6,4' }
      ).addTo(mapa);
    }
    document.getElementById('btn-guardar').disabled = puntos.length < 2;
  }

  function actualizarInfoPuntos() {
    document.getElementById('info-puntos').textContent =
      puntos.length === 0
        ? `${nombreActual} — haz clic para agregar puntos.`
        : `${puntos.length} punto${puntos.length > 1 ? 's' : ''} marcado${puntos.length > 1 ? 's' : ''}. Clic derecho para quitar el último.`;
  }

  // ── Limpiar puntos ────────────────────────────────────────────────────────
  function limpiarPuntos() {
    puntos = [];
    marcadores.forEach(m => mapa.removeLayer(m));
    marcadores = [];
    if (lineaPreview) { mapa.removeLayer(lineaPreview); lineaPreview = null; }
    if (lineaORS) { mapa.removeLayer(lineaORS); lineaORS = null; }
    document.getElementById('btn-guardar').disabled = true;
    document.getElementById('info-resultado').style.display = 'none';
    document.getElementById('cargando').style.display = 'none';
  }

  // ── Guardar ruta → enviar a ORS ──────────────────────────────────────────
  async function guardarRuta() {
    if (puntos.length < 2) return;
    document.getElementById('cargando').style.display = 'block';
    document.getElementById('btn-guardar').disabled = true;
    document.getElementById('msg').className = '';

    try {
      const res = await fetch('/rutas-admin/trazar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre: nombreActual,
          ruta_clave: rutaActual,
          puntos: puntos,
        }),
      });
      const data = await res.json();

      if (res.ok) {
        // Mostrar ruta generada por ORS
        if (lineaPreview) mapa.removeLayer(lineaPreview);
        if (lineaORS) mapa.removeLayer(lineaORS);
        lineaORS = L.polyline(data.puntos, {
          color: COLORES[rutaActual],
          weight: 5,
          opacity: 0.9,
        }).addTo(mapa);
        mapa.fitBounds(lineaORS.getBounds(), { padding: [30, 30] });

        document.getElementById('info-resultado').style.display = 'block';
        document.getElementById('res-distancia').textContent =
          `📏 Distancia: ${data.distancia_km} km`;
        document.getElementById('res-duracion').textContent =
          `⏱️ Duración estimada: ${data.duracion_minutos} min`;

        document.getElementById('msg').className = 'ok';
        document.getElementById('msg').textContent =
          `✅ Ruta "${nombreActual}" guardada correctamente.`;

        // Actualizar estado en el panel
        const el = document.getElementById(`estado-${rutaActual}`);
        if (el) {
          el.textContent = `✓ ${data.duracion_minutos} min · ${data.distancia_km} km`;
          el.className = 'ruta-estado trazada';
        }

        // Limpiar marcadores de puntos (ya no son necesarios)
        marcadores.forEach(m => mapa.removeLayer(m));
        marcadores = [];
        puntos = [];
        lineaPreview = null;
      } else {
        document.getElementById('msg').className = 'err';
        document.getElementById('msg').textContent = '❌ ' + data.detail;
        document.getElementById('btn-guardar').disabled = false;
      }
    } catch(e) {
      document.getElementById('msg').className = 'err';
      document.getElementById('msg').textContent = '❌ Error de conexión con ORS.';
      document.getElementById('btn-guardar').disabled = false;
    }

    document.getElementById('cargando').style.display = 'none';
  }

  cargarEstados();
</script>
</body>
</html>
